appId: com.delfin.app
productName: Delfin
asar: true
directories:
  output: dist/electron
files:
  - out/**/*
  - node_modules/**/*
extraResources:
  - from: dist/sidecar
    to: sidecar
mac:
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
    - tar.gz
